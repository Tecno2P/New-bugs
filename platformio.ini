; ============================================================
;  IR Remote Web GUI — PlatformIO Configuration
;  v4.0.0  |  Target: ESP32-WROOM-32 (4 MB Flash)
;  Framework: Arduino
;
;  New in v4.0.0:
;    + 124 IR protocols (full IRremoteESP8266 v2.8.6 support)
;    + SD card subsystem (hot-plug safe)
;    + Internal LittleFS macros (no SD required)
;    + Scheduler per-entry repeat count/delay
;    + Button icon + color fields
;
;  Library versions PINNED (no ^ caret) to prevent
;  automatic upgrades that break the API.
; ============================================================

[platformio]
src_dir     = src
include_dir = include
data_dir    = data

[env:esp32dev]
platform  = espressif32 @ 6.6.0
board     = esp32dev
framework = arduino

; ── Serial monitor ──────────────────────────────────────────
monitor_speed = 115200

; ── Flash / partition ───────────────────────────────────────
board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs

; ── Build flags ─────────────────────────────────────────────
build_unflags = -std=gnu++11 -O2
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DLOG_LOCAL_LEVEL=ESP_LOG_ERROR
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_ESP32_DEV
    -std=gnu++17
    -Os
    -Wall
    -Wno-unused-parameter
    -Wno-format-truncation
    -Wno-cpp
    -DFIRMWARE_VERSION=\"4.0.0\"
    ; ── IR protocols: enable ALL (IRremoteESP8266 v2.8.6) ───
    ; _IR_ENABLE_DEFAULT_=true enables every protocol the library
    ; supports. This is the correct approach when using 120+ protocols.
    ; Firmware size impact: ~150 KB extra vs 6-protocol build.
    ; Still fits comfortably in the 1344 KB app partition.
    -D_IR_ENABLE_DEFAULT_=true
    ; ── AsyncTCP: keep on core 0, loop() on core 1 ──────────
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    ; ── SD card SPI pins (VSPI bus) ─────────────────────────
    -DSD_CS_PIN=4
    -DSD_MOSI_PIN=23
    -DSD_MISO_PIN=19
    -DSD_SCK_PIN=18
    -DSD_SPI_FREQ=4000000
    ; ── New module config file paths ─────────────────────────
    -DNFC_GPIO_FILE=\"/nfc_gpio.json\"
    -DRFID_GPIO_FILE=\"/rfid_gpio.json\"
    -DSUBGHZ_GPIO_FILE=\"/subghz_gpio.json\"
    -DNRF24_GPIO_FILE=\"/nrf24_gpio.json\"

; ── Libraries (PINNED exact versions) ───────────────────────
lib_deps =
    crankyoldgit/IRremoteESP8266 @ 2.8.6
    mathieucarbou/ESPAsyncWebServer @ 3.3.12
    mathieucarbou/AsyncTCP @ 3.2.4
    bblanchon/ArduinoJson @ 7.2.1
    nRF24/RF24 @ 1.4.8
    mikalhart/TinyGPSPlus @ 1.0.3
    fastled/FastLED @ 3.6.0
    https://github.com/adafruit/Adafruit-PN532.git#1.3.1
    https://github.com/adafruit/Adafruit_BusIO.git#1.16.1
    ; CC1101: Direct SPI register access (no external lib needed)
    ; SD, HTTPClient, WiFiClientSecure, DNSServer — ESP32 Arduino framework built-in

; ── Upload ───────────────────────────────────────────────────
upload_speed = 921600
